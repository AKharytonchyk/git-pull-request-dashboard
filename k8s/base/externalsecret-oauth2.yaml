apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: oauth2-proxy
  namespace: automation
  annotations:
    # The `key:` fields under remoteRef are OCI Vault path identifiers, not
    # secret material — they describe *where* to fetch the value from. Checkov's
    # entropy heuristic doesn't know that, so flag the false positives here.
    checkov.io/skip1: CKV_SECRET_6=remoteRef.key fields are vault path identifiers, not secret values
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # Shared Google "Web application" OAuth client (see defectdojo + DT OIDC).
    - secretKey: client-id
      remoteRef:
        key: google-sso-oauth-client-id
    - secretKey: client-secret
      remoteRef:
        key: google-sso-oauth-client-secret
    - secretKey: cookie-secret
      remoteRef:
        key: google-sso-cookie-secret
