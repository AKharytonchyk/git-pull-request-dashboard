apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: oauth2-proxy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # Shared Google "Web application" OAuth client (see defectdojo + DT OIDC).
    - secretKey: client-id
      remoteRef:
        key: google-sso-oauth-client-id
    # checkov:skip=CKV_SECRET_6:remoteRef.key is an OCI Vault path identifier, not a secret value
    - secretKey: client-secret
      remoteRef:
        key: google-sso-oauth-client-secret
    # checkov:skip=CKV_SECRET_6:remoteRef.key is an OCI Vault path identifier, not a secret value
    - secretKey: cookie-secret
      remoteRef:
        key: google-sso-cookie-secret
