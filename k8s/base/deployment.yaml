apiVersion: apps/v1
kind: Deployment
metadata:
  name: git-pull-request-dashboard
  labels:
    app: git-pull-request-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: git-pull-request-dashboard
  template:
    metadata:
      labels:
        app: git-pull-request-dashboard
    spec:
      # Keep off the control-plane Pi; run on the amd64 worker (ff-vm1).
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      # ghcr.io/magmamoose/* pull creds — the `automation` ns carries the
      # `ghcr-pull-secret: sync` label so Kyverno clones the secret in.
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: git-pull-request-dashboard
          # nginx-unprivileged serves the static Vite/React bundle on :8080.
          # Tag is pinned + bumped by Flux image automation in overlays/prod.
          image: ghcr.io/magmamoose/git-pull-request-dashboard:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      restartPolicy: Always
