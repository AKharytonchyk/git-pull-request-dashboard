---
# kics-scan disable=3d658f8b-d988-41a0-a841-40043121de1e
# Disables KICS "Secrets As Environment Variables" — the OAuth client creds
# and session secret are read by server/index.mjs from process.env at boot,
# and secretKeyRef is the recommended k8s pattern for injecting them.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: git-pull-request-dashboard
  labels:
    app: git-pull-request-dashboard
  annotations:
    # Tag + digest are pinned by Flux image automation in overlays/prod;
    # `:latest` here is the placeholder Flux rewrites on every reconcile.
    checkov.io/skip1: CKV_K8S_14=Image tag is pinned by Flux in overlays/prod
    checkov.io/skip2: CKV_K8S_43=Image digest is pinned by Flux in overlays/prod
    # OAuth client creds + session secret must be injected as env vars because
    # the Node runtime reads them via process.env at boot (server/index.mjs).
    # Mounting as files would force the runtime to learn a file-based config.
    checkov.io/skip3: CKV_K8S_35=OAuth runtime reads creds from process.env at boot; secretKeyRef is the recommended pattern
    # The Node base image's documented production user is `node` (uid 1000),
    # which satisfies runAsNonRoot; CKV_K8S_40's >=10000 floor would mean
    # running as an unmapped UID with no homedir for no extra hardening.
    checkov.io/skip4: CKV_K8S_40=Using the upstream node:22-alpine user (uid 1000); runAsNonRoot is enforced via securityContext
    # Cluster-wide NetworkPolicy is owned by the infra repo (Kyverno + the
    # cloudflared tunnel define the trust boundary); replicating it per app
    # here would drift from the policy source of truth.
    checkov.io/skip5: CKV2_K8S_6=Cluster NetworkPolicy is owned and applied by the infra repo
    # Namespace is applied by the kustomize overlay at overlays/prod; checkov
    # sees the base manifest where it isn't set yet.
    checkov.io/skip6: CKV_K8S_21=Namespace is set to `automation` by the kustomize overlay at overlays/prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: git-pull-request-dashboard
  template:
    metadata:
      labels:
        app: git-pull-request-dashboard
    spec:
      # Keep off the control-plane Pi; run on the amd64 worker (ff-vm1).
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # ghcr.io/magmamoose/* pull creds — the `automation` ns carries the
      # `ghcr-pull-secret: sync` label so Kyverno clones the secret in.
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: git-pull-request-dashboard
          # Node serves the static Vite/React bundle and GitHub OAuth endpoints
          # on :8080.
          # Tag is pinned + bumped by Flux image automation in overlays/prod.
          image: ghcr.io/magmamoose/git-pull-request-dashboard:latest
          imagePullPolicy: Always
          env:
            - name: APP_BASE_URL
              value: https://pullrequests.magmamoose.com
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-oauth
                  key: session-secret
                  optional: true
            - name: GITHUB_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: github-oauth
                  key: github-client-id
                  optional: true
            - name: GITHUB_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-oauth
                  key: github-client-secret
                  optional: true
            - name: GHE_OAUTH_APPS
              valueFrom:
                secretKeyRef:
                  name: github-oauth
                  key: ghe-oauth-apps
                  optional: true
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        # readOnlyRootFilesystem leaves nothing writable; Node's tmpfile use
        # (npm cache, undici scratch) lands here instead of the image layer.
        - name: tmp
          emptyDir: {}
      restartPolicy: Always
